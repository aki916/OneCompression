model_path: null
model_device: auto

# Output directory
output_dir: llama3-8b

# Calibration data parameters
max_length: 2048
num_calibration_samples: 1024
calibration_strategy: drop_rand
calibration_seed: 0
calibration_batch_size: 64

# GPTQ parameters
gptq:
  num_layers: null
  bits: [4, 3]
  group_size: [128, null]
  symmetric: true
  blocksize: 128
  percdamp: 0.01
  actorder: false
  mse: false
  q_grid: 600
  q_norm: 2.4

# Evaluation
calc_ppl: true
calc_original_ppl: true
calc_acc: true
calc_original_acc: true

# Hydra
hydra:
  run:
    dir: ${output_dir}
  job:
    chdir: true
