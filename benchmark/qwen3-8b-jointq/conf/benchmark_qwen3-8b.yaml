model_path: null
model_device: auto

# Output directory
output_dir: qwen3-8b

# Calibration data parameters
max_length: 2048
num_calibration_samples: 1024
calibration_strategy: drop_rand
calibration_seed: 0
calibration_batch_size: 64

# JointQ parameters
jointq:
  num_layers: null
  bits: [4, 3]
  group_size: [128, null]
  symmetric: true
  log_level: 0
  device: null

  # Lambda regularization (explicit — do not rely on JointQ defaults)
  lambda_mode: "fixed_lambda"
  regularization_lambda: 0.2
  regularization_mode: "identity"
  regularization_gamma: 0.5
  lambda_list: [0.001, 0.01, 0.05, 0.1, 0.15, 0.2, 0.3, 0.5]

  # Activation ordering / GPTQ MSE
  actorder: false
  gptq_mse: false

# Evaluation
calc_ppl: true
calc_original_ppl: true
calc_acc: true
calc_original_acc: true

# Hydra
hydra:
  run:
    dir: ${output_dir}
  job:
    chdir: true
